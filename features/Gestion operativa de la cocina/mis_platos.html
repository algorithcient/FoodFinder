<!DOCTYPE html>
<html lang="es-PE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../Assests/Icons/LogoPrincipal.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../styles.css">
    <title>Mis Platos - FoodFinder</title>
</head>
<body class="dashboard_body">

    <!-- NAVBAR -->
    <header class="dashboard_navbar">
        <a href="#" class="dashboard_logo">
            <img src="../../Assests/Icons/LogoPrincipal.svg" alt="Logo FoodFinder" width="32" height="32">
            <span class="logo_texto"><span class="logo_food">Food</span><span class="logo_finder">Finder</span></span>
        </a>
        <nav class="dashboard_nav_derecha">
            <button class="btn_dashboard">Dashboard</button>
            <a href="#" class="nav_icono_link">
                <span class="nav_icono">&#128100;</span>
                <span class="nav_icono_label">Perfil</span>
            </a>
            <a href="#" class="nav_icono_link">
                <span class="nav_icono">&#128682;</span>
                <span class="nav_icono_label">Salir</span>
            </a>
        </nav>
    </header>

    <div class="dashboard_layout">

        <!-- SIDEBAR -->
        <aside class="dashboard_sidebar">
            <p class="sidebar_titulo">PANEL DE GESTIÓN</p>
            <nav class="sidebar_nav">
                <a href="#" class="sidebar_item">
                    <span class="sidebar_icono">&#127968;</span>
                    Resumen
                </a>
                <a href="#" class="sidebar_item">
                    <span class="sidebar_icono">&#128276;</span>
                    Pedidos entrantes
                </a>
                <a href="mis_platos.html" class="sidebar_item sidebar_item_activo">
                    <span class="sidebar_icono">&#127860;</span>
                    Mis Platos
                </a>
                <a href="#" class="sidebar_item">
                    <span class="sidebar_icono">&#128230;</span>
                    Inventario
                </a>
                <a href="#" class="sidebar_item">
                    <span class="sidebar_icono">&#128202;</span>
                    Estadísticas
                </a>
                <a href="#" class="sidebar_item">
                    <span class="sidebar_icono">&#9881;</span>
                    Configuración
                </a>
            </nav>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="dashboard_contenido">

            <div class="pagina_cabecera">
                <h1 class="dashboard_titulo_pagina">Mis platos</h1>
                <button class="btn_agregar">&#43; Agregar plato</button>
            </div>

            <!-- Tabla de platos -->
            <section class="tabla_card">
                <table class="tabla_dashboard">
                    <thead>
                        <tr class="tabla_encabezado">
                            <th class="tabla_th">PLATOS</th>
                            <th class="tabla_th">PRECIO</th>
                            <th class="tabla_th">STOCK</th>
                            <th class="tabla_th">ESTADO</th>
                            <th class="tabla_th">PEDIDOS</th>
                            <th class="tabla_th">ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="tabla_fila">
                            <td class="tabla_td">Seco de pollo</td>
                            <td class="tabla_td">S/ 30</td>
                            <td class="tabla_td">15</td>
                            <td class="tabla_td"><span class="badge_con_stock">Con stock</span></td>
                            <td class="tabla_td">7</td>
                            <td class="tabla_td tabla_acciones">
                                <button class="btn_editar">&#9998; Editar</button>
                                <button class="btn_eliminar">&#128465;</button>
                            </td>
                        </tr>
                        <tr class="tabla_fila">
                            <td class="tabla_td">Locro de zapallo</td>
                            <td class="tabla_td">S/ 15</td>
                            <td class="tabla_td">8</td>
                            <td class="tabla_td"><span class="badge_con_stock">Con stock</span></td>
                            <td class="tabla_td">8</td>
                            <td class="tabla_td tabla_acciones">
                                <button class="btn_editar">&#9998; Editar</button>
                                <button class="btn_eliminar">&#128465;</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </main>
    </div>

</body>
</html>
